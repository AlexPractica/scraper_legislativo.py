name: Generador de Boletín Legislativo

# Configurar para que corra todos los viernes a las 5:00 PM (Hora de CDMX)
# La hora en GitHub está en UTC, por lo que las 23:00 UTC son las 17:00 CST.
on:
  schedule:
    - cron: '0 23 * * 5'
  # Esto permite ejecutar el script manualmente desde GitHub cuando quieras probarlo
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar el Agente de Scraping
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Ejecuta el script y guarda la salida en un archivo de texto
          python scraper_legislativo.py > boletin_semanal.txt

      - name: Guardar Boletín como Artefacto
        uses: actions/upload-artifact@v3
        with:
          name: Boletin-Legislativo
          path: boletin_semanal.txt
          retention-days: 7
