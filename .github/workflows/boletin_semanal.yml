name: Generador de Boletín Legislativo

on:
  schedule:
    - cron: '0 23 * * 5'
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4 # <-- Actualizado a v4

      - name: Configurar Python
        uses: actions/setup-python@v5 # <-- Actualizado a v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar el Agente de Scraping
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper_legislativo.py > boletin_semanal.txt

      - name: Guardar Boletín como Artefacto
        uses: actions/upload-artifact@v4 # <-- ¡Aquí está la solución al error! (v4)
        with:
          name: Boletin-Legislativo
          path: boletin_semanal.txt
          retention-days: 7
